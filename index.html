<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok跨境电商部门月度经营进度 — 2026年7月</title>
<style>
/* ============================================================
   全局重置与基础样式
   ============================================================ */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
  background: #f6f7f9;
  color: #172033;
  line-height: 1.5;
  font-size: 17px;
}
.container { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }

/* ============================================================
   顶部标题区
   ============================================================ */
.header {
  background: linear-gradient(135deg, #12304a 0%, #1f5f66 100%);
  color: #fff;
  padding: 30px 38px;
  border-radius: 10px;
  margin-bottom: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 16px;
}
.header-left h1 { font-size: 34px; font-weight: 800; letter-spacing: 0; }
.header-left .subtitle { font-size: 17px; opacity: 0.85; margin-top: 6px; }
.header-right { text-align: right; flex-shrink: 0; }
.header-right .month-badge {
  display: inline-block;
  background: rgba(255,255,255,0.15);
  padding: 6px 16px;
  border-radius: 6px;
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 8px;
}
.header-right .update-time { font-size: 14px; opacity: 0.7; display: block; }
.btn-print {
  display: inline-block;
  margin-top: 8px;
  padding: 8px 20px;
  background: rgba(255,255,255,0.2);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 6px;
  font-size: 15px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-print:hover { background: rgba(255,255,255,0.3); }

/* ============================================================
   筛选栏
   ============================================================ */
.filter-bar {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-bar label { font-size: 15px; font-weight: 600; color: #555; }
.filter-bar select {
  padding: 8px 14px;
  border: 1px solid #c8ced6;
  border-radius: 6px;
  font-size: 15px;
  background: #fff;
  color: #1a1a2e;
  min-width: 120px;
}

/* ============================================================
   区块标题
   ============================================================ */
.section-title {
  font-size: 24px;
  font-weight: 800;
  color: #172033;
  margin: 28px 0 14px;
  padding-left: 14px;
  border-left: 5px solid #0f766e;
}

/* ============================================================
   部门总览 - 6张大号数据卡片
   ============================================================ */
.overview-cards {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 16px;
  margin-bottom: 10px;
}
.overview-card {
  background: #fff;
  border-radius: 8px;
  padding: 22px 18px 18px;
  text-align: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  border-top: 4px solid #0f766e;
}
.overview-card .oc-number {
  font-size: 36px;
  font-weight: 800;
  color: #12304a;
  line-height: 1.2;
}
.overview-card .oc-label {
  font-size: 15px;
  color: #666;
  margin-top: 6px;
}
.overview-card .oc-bar {
  height: 6px;
  background: #e8ecf1;
  border-radius: 3px;
  margin-top: 10px;
  overflow: hidden;
}
.overview-card .oc-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.4s;
}
/* 状态颜色 */
.oc-green  .oc-number { color: #1a7a34; }
.oc-green  .oc-bar-fill { background: #28a745; }
.oc-red    .oc-number { color: #c72a2a; }
.oc-red    .oc-bar-fill { background: #dc3545; }
.oc-orange .oc-number { color: #b86e0e; }
.oc-orange .oc-bar-fill { background: #f0a030; }
.oc-gray   .oc-number { color: #6c757d; }
.oc-gray   .oc-bar-fill { background: #adb5bd; }

/* ============================================================
   今日工作进展
   ============================================================ */
.daily-progress {
  background: #fff;
  border-radius: 8px;
  padding: 22px 24px;
  box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
  border: 1px solid #e5e7eb;
}
.daily-head {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  align-items: flex-start;
  margin-bottom: 18px;
}
.daily-title {
  font-size: 22px;
  font-weight: 800;
  color: #12304a;
}
.daily-subtitle {
  color: #64748b;
  font-size: 15px;
  margin-top: 4px;
}
.daily-summary {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.daily-pill {
  background: #ecfdf5;
  color: #047857;
  border: 1px solid #a7f3d0;
  border-radius: 999px;
  padding: 6px 12px;
  font-size: 14px;
  font-weight: 700;
}
.daily-list {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 16px;
}
.daily-group {
  background: #f8fafc;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  padding: 14px;
}
.daily-group-title {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 18px;
  font-weight: 800;
  color: #12304a;
  margin-bottom: 12px;
}
.daily-group-count {
  font-size: 13px;
  color: #0f766e;
  background: #ecfdf5;
  border: 1px solid #a7f3d0;
  border-radius: 999px;
  padding: 3px 9px;
}
.daily-item {
  border: 1px solid #e5e7eb;
  border-left: 5px solid #0f766e;
  border-radius: 8px;
  padding: 16px;
  background: #fff;
  margin-bottom: 12px;
}
.daily-item:last-child { margin-bottom: 0; }
.daily-item.support { border-left-color: #dc2626; background: #fff7f7; }
.daily-item.risk { border-left-color: #f59e0b; background: #fffbeb; }
.daily-item.status { border-left-color: #2563eb; }
.daily-item.new { border-left-color: #7c3aed; }
.daily-meta {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}
.daily-tag {
  display: inline-block;
  padding: 3px 9px;
  border-radius: 999px;
  background: #e0f2fe;
  color: #075985;
  font-size: 13px;
  font-weight: 700;
}
.daily-task-name {
  font-size: 18px;
  font-weight: 800;
  color: #172033;
  margin-bottom: 8px;
}
.daily-change {
  font-size: 16px;
  color: #334155;
  margin-bottom: 10px;
}
.daily-change strong { color: #047857; font-size: 20px; }
.daily-bar {
  height: 9px;
  background: #e5e7eb;
  border-radius: 999px;
  overflow: hidden;
}
.daily-bar-fill {
  height: 100%;
  background: #0f766e;
  border-radius: 999px;
}
.daily-empty {
  padding: 28px;
  text-align: center;
  color: #64748b;
  background: #f8fafc;
  border-radius: 8px;
  border: 1px dashed #cbd5e1;
  font-weight: 700;
}
.new-task-window {
  margin-top: 18px;
  border: 1px solid #dbeafe;
  background: #eff6ff;
  border-radius: 8px;
  padding: 16px;
}
.new-task-title {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 18px;
  font-weight: 800;
  color: #1d4ed8;
  margin-bottom: 12px;
}
.new-task-list {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}
.new-task-card {
  background: #fff;
  border: 1px solid #bfdbfe;
  border-radius: 8px;
  padding: 13px;
}
.new-task-name {
  font-weight: 800;
  color: #172033;
  margin-bottom: 8px;
}
.new-task-meta {
  color: #475569;
  font-size: 14px;
  line-height: 1.7;
}

/* ============================================================
   双栏布局 - 个人KPI卡片
   ============================================================ */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
.panel {
  background: #fff;
  border-radius: 10px;
  padding: 22px 24px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}
.panel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 2px solid #eef1f5;
}
.panel-title { font-size: 20px; font-weight: 700; color: #1a3350; }
.panel-role { font-size: 14px; color: #888; margin-top: 2px; }
.panel-badge {
  background: #eef1f5;
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 15px;
  font-weight: 700;
  color: #1a3350;
  white-space: nowrap;
}

/* 个人KPI列表项 */
.person-kpi-item {
  padding: 13px 0;
  border-bottom: 1px solid #f0f2f5;
  cursor: pointer;
  transition: background 0.15s;
}
.person-kpi-item:last-child { border-bottom: none; }
.person-kpi-item:hover { background: #f8fafc; margin: 0 -8px; padding-left: 8px; padding-right: 8px; border-radius: 6px; }
.pkpi-main {
  display: flex;
  align-items: center;
  gap: 12px;
}
.pkpi-name { flex: 1; font-size: 16px; font-weight: 600; color: #222; min-width: 0; }
.pkpi-target { width: 70px; text-align: center; font-size: 14px; color: #888; flex-shrink: 0; }
.pkpi-actual { width: 60px; text-align: center; font-size: 18px; font-weight: 700; color: #1a3350; flex-shrink: 0; }
.pkpi-rate  { width: 65px; text-align: center; font-size: 14px; font-weight: 600; flex-shrink: 0; }
.pkpi-status { width: 75px; text-align: center; flex-shrink: 0; }
.pkpi-note {
  display: none;
  font-size: 14px;
  color: #777;
  margin-top: 6px;
  padding-left: 4px;
  border-left: 3px solid #e0e4e8;
}
.pkpi-note.show { display: block; }

/* ============================================================
   状态标签
   ============================================================ */
.badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 14px;
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
}
.badge-green  { background: #d4edda; color: #155724; }
.badge-red    { background: #f8d7da; color: #721c24; }
.badge-orange { background: #fff3cd; color: #856404; }
.badge-gray   { background: #e9ecef; color: #495057; }

/* 阻塞标记 */
.blocked-icon {
  display: inline-block;
  color: #dc3545;
  font-weight: 700;
  font-size: 16px;
  margin-left: 4px;
}

/* ============================================================
   KPI总表
   ============================================================ */
.table-wrap {
  overflow-x: auto;
  background: #fff;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}
.data-table {
  width: 100%;
  border-collapse: collapse;
  min-width: 900px;
}
.data-table th {
  background: #eef1f5;
  padding: 13px 14px;
  text-align: left;
  font-size: 15px;
  font-weight: 700;
  color: #1a3350;
  border-bottom: 2px solid #d5dbe3;
  white-space: nowrap;
}
.data-table td {
  padding: 12px 14px;
  font-size: 15px;
  border-bottom: 1px solid #f0f2f5;
  vertical-align: middle;
}
.data-table tbody tr:hover { background: #f8fafc; }
.data-table .col-center { text-align: center; }
.data-table .col-narrow { width: 70px; }

/* 进度小条（表格内） */
.mini-bar {
  display: inline-block;
  width: 70px;
  height: 6px;
  background: #e8ecf1;
  border-radius: 3px;
  vertical-align: middle;
  margin-right: 6px;
  overflow: hidden;
}
.mini-bar-fill {
  height: 100%;
  border-radius: 3px;
}
.mini-bar-fill.green  { background: #28a745; }
.mini-bar-fill.red    { background: #dc3545; }
.mini-bar-fill.orange { background: #f0a030; }
.mini-bar-fill.gray   { background: #adb5bd; }

/* ============================================================
   P0任务表
   ============================================================ */
.p0-table { min-width: 800px; }

/* ============================================================
   成果卡片
   ============================================================ */
.achievement-cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.achieve-card {
  background: #fff;
  border-radius: 10px;
  padding: 20px 22px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  border-left: 4px solid #1a3350;
}
.achieve-card .achieve-tag {
  display: inline-block;
  font-size: 13px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 4px;
  margin-bottom: 8px;
}
.achieve-card .achieve-tag.done     { background: #d4edda; color: #155724; }
.achieve-card .achieve-tag.progress { background: #fff3cd; color: #856404; }
.achieve-card .achieve-text { font-size: 17px; font-weight: 600; color: #1a1a2e; }

/* ============================================================
   未达标区域
   ============================================================ */
.noncompliance-panel {
  background: #fff;
  border-radius: 10px;
  padding: 22px 24px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  border-left: 5px solid #dc3545;
}
.nc-table { min-width: 750px; }
.nc-none {
  text-align: center;
  padding: 32px;
  font-size: 18px;
  font-weight: 600;
  color: #28a745;
}

/* ============================================================
   需要老板支持
   ============================================================ */
.support-panel {
  background: #fff;
  border-radius: 10px;
  padding: 22px 24px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}
.support-none {
  text-align: center;
  padding: 24px;
  font-size: 17px;
  color: #666;
}
.support-items { list-style: none; }
.support-items li {
  padding: 14px 16px;
  border-bottom: 1px solid #f0f2f5;
  font-size: 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px 24px;
  align-items: baseline;
}
.support-items li:last-child { border-bottom: none; }
.support-label { font-weight: 700; color: #555; white-space: nowrap; }
.support-value { color: #1a1a2e; }

/* ============================================================
   底部
   ============================================================ */
.footer {
  text-align: center;
  padding: 24px 0;
  color: #999;
  font-size: 14px;
  border-top: 1px solid #e0e4e8;
  margin-top: 24px;
}

/* ============================================================
   打印样式
   ============================================================ */
@media print {
  body { background: #fff; font-size: 14px; }
  .container { max-width: 100%; padding: 0; }
  .filter-bar, .btn-print, .header-right .btn-print { display: none !important; }
  .header { background: #1a3350 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .overview-cards { grid-template-columns: repeat(6, 1fr); gap: 8px; }
  .overview-card { padding: 12px 10px; }
  .overview-card .oc-number { font-size: 24px; }
  .two-col { grid-template-columns: 1fr 1fr; gap: 12px; }
  .section-title { font-size: 18px; margin: 18px 0 10px; }
  .panel { break-inside: avoid; }
  .table-wrap { overflow-x: visible; }
  @page { size: A4 landscape; margin: 12mm; }
}

/* ============================================================
   店铺运营状态卡片
   ============================================================ */
.store-cards {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 10px;
}
.store-card {
  background: #fff;
  border-radius: 8px;
  padding: 18px 16px;
  box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
  border-top: 4px solid #0f766e;
}
.store-card.store-my { border-top-color: #2d5a8a; }
.store-card.store-ph { border-top-color: #1a6b4a; }
.store-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
  padding-bottom: 10px;
  border-bottom: 1px solid #eef1f5;
}
.store-name { font-size: 19px; font-weight: 800; color: #12304a; }
.store-country {
  font-size: 12px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 4px;
  color: #fff;
}
.store-country.my { background: #2d5a8a; }
.store-country.ph { background: #1a6b4a; }
.store-owner { font-size: 14px; color: #64748b; margin-bottom: 12px; }
.store-owner strong { color: #555; }
.store-metrics {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  margin-bottom: 14px;
}
.store-metric {
  background: #f8fafc;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  padding: 10px;
}
.store-metric-label {
  font-size: 12px;
  color: #64748b;
  font-weight: 700;
}
.store-metric-value {
  font-size: 21px;
  color: #12304a;
  font-weight: 800;
  margin-top: 2px;
  word-break: break-word;
}

.store-task-item {
  margin-bottom: 11px;
}
.store-task-item:last-child { margin-bottom: 0; }
.store-task-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
}
.store-task-label { font-size: 15px; color: #172033; font-weight: 700; }
.store-task-pct { font-size: 14px; font-weight: 800; color: #0f766e; }
.store-task-bar {
  height: 8px;
  background: #e8ecf1;
  border-radius: 3px;
  overflow: hidden;
}
.store-task-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.4s;
}
.store-task-bar-fill.green  { background: #059669; }
.store-task-bar-fill.orange { background: #f59e0b; }
.store-task-bar-fill.red    { background: #dc3545; }
.store-task-bar-fill.gray   { background: #adb5bd; }
.store-task-note { font-size: 12px; color: #999; margin-top: 2px; }

.store-health {
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid #eef1f5;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
  font-weight: 600;
}
.store-health-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.store-health-dot.green  { background: #28a745; }
.store-health-dot.orange { background: #f0a030; }
.store-health-dot.red    { background: #dc3545; }

/* ============================================================
   响应式
   ============================================================ */
@media (max-width: 1200px) {
  .overview-cards { grid-template-columns: repeat(3, 1fr); }
  .store-cards { grid-template-columns: repeat(2, 1fr); }
  .daily-list { grid-template-columns: 1fr; }
}
@media (max-width: 768px) {
  .header { padding: 20px; }
  .header-left h1 { font-size: 24px; }
  .header-left .subtitle { font-size: 15px; }
  .overview-cards { grid-template-columns: repeat(2, 1fr); }
  .overview-card .oc-number { font-size: 28px; }
  .two-col { grid-template-columns: 1fr; }
  .store-cards { grid-template-columns: 1fr 1fr; }
  .achievement-cards { grid-template-columns: 1fr; }
  .container { padding: 12px; }
}
@media (max-width: 480px) {
  .overview-cards { grid-template-columns: 1fr 1fr; gap: 10px; }
  .overview-card { padding: 14px 10px; }
  .overview-card .oc-number { font-size: 26px; }
  .header-left h1 { font-size: 22px; }
  .pkpi-main { flex-wrap: wrap; }
}
</style>
</head>
<body>

<div class="container" id="app">

  <!-- ============================================================
       顶部标题区（由JS动态渲染）
       ============================================================ -->
  <div class="header">
    <div class="header-left">
      <h1 id="header-title"></h1>
      <div class="subtitle" id="header-subtitle"></div>
    </div>
    <div class="header-right">
      <span class="month-badge" id="header-month"></span>
      <span class="update-time" id="header-update"></span>
      <button class="btn-print" onclick="window.print()">打印 / 导出PDF</button>
    </div>
  </div>

  <!-- 筛选栏 -->
  <div class="filter-bar">
    <label>负责人：</label>
    <select id="filterOwner">
      <option value="all">全部</option>
      <option value="葛宗尚">葛宗尚</option>
      <option value="欧阳林">欧阳林</option>
      <option value="共同负责">共同负责</option>
    </select>
    <label>状态：</label>
    <select id="filterStatus">
      <option value="all">全部</option>
      <option value="已达标">已达标</option>
      <option value="未达标">未达标</option>
      <option value="进行中">进行中</option>
      <option value="未开始">未开始</option>
    </select>
  </div>

  <!-- ============================================================
       部门本月总览（6张大号数据卡片）
       ============================================================ -->
  <div class="section-title">部门本月总览</div>
  <div class="overview-cards" id="overviewCards"></div>

  <!-- ============================================================
       今日工作进展
       ============================================================ -->
  <div class="section-title">今日工作进展</div>

    },
    {
      "tag": "已推进",
      "tagClass": "progress",
      "text": "剪辑外包开始试单"
    },

/* ============================================================
   工具函数
   ============================================================ */

/** 计算完成率（上限100%） */
function calcRate(actual, target) {
  if (target === 0) return 0;
  return Math.min(100, Math.round((actual / target) * 100));
}

/** KPI优先使用飞书“进度百分比”字段 */
function calcKpiRate(kpi) {
  if (typeof kpi.progressPercent === "number") {
    return Math.max(0, Math.min(100, Math.round(kpi.progressPercent)));
  }
  return calcRate(kpi.actual, kpi.target);
}

/** 根据实际值和状态字段判断颜色主题 */
function getColorClass(actual, target, status) {
  if (status === "未达标") return "oc-red";
  if (status === "未开始") return "oc-gray";
  if (actual >= target && target > 0) return "oc-green";
  if (actual > 0 && actual < target) return "oc-orange";
  if (actual === 0 && status !== "已达标") return "oc-gray";
  return "oc-orange";
}

/** 判断达标状态文字 */
function getPassStatus(actual, target, status) {
  if (status === "未达标") return "未达标";
  if (status === "未开始") return "未开始";
  if (actual >= target && target > 0) return "已达标";
  if (actual > 0) return "进行中";
  return "未开始";
}

/** KPI达标状态优先参考进度百分比 */
function getKpiPassStatus(kpi) {
  if (kpi.status === "未达标") return "未达标";
  if (kpi.status === "未开始") return "未开始";
  var rate = calcKpiRate(kpi);
  if (rate >= 100 || kpi.status === "已达标") return "已达标";
  if (rate > 0 || kpi.actual > 0) return "进行中";
  return "未开始";
}

/** 获取状态对应的badge class */
function getBadgeClass(status) {
  if (status === "已达标") return "badge-green";
  if (status === "未达标") return "badge-red";
  if (status === "进行中") return "badge-orange";
  return "badge-gray";
}

function renderHeader() {

  document.getElementById("header-subtitle").textContent =
    dashboardData.month + "｜" + dashboardData.subtitle;

}

/** 渲染部门总览6卡片 */
function renderOverview() {
  var html = "";
  dashboardData.overview.forEach(function(card) {
    var rate = calcRate(card.actual, card.target);
    var status = getPassStatus(card.actual, card.target, "auto");
    // 对于kpiPass，特殊处理：统计所有KPI中已达标数量
    if (card.key === "kpiPass") {
      var passed = dashboardData.kpis.filter(function(k) {
        return getKpiPassStatus(k) === "已达标";
      }).length;
      card.actual = passed;
      rate = calcRate(passed, card.target);
      status = passed >= card.target ? "已达标" : (passed > 0 ? "进行中" : "未开始");
    }
    var cls = getColorClass(card.actual, card.target, status);
    var displayActual = card.key === "kpiPass" ? card.actual : card.actual;
    html += '<div class="overview-card ' + cls + '">';
    html += '<div class="oc-number">' + displayActual + ' / ' + card.target + '</div>';
    html += '<div class="oc-label">' + card.label + '</div>';
    html += '<div class="oc-bar"><div class="oc-bar-fill" style="width:' + rate + '%"></div></div>';
    html += '</div>';
  });
  document.getElementById("overviewCards").innerHTML = html;
}

/** 渲染今日工作进展 */
function renderDailyProgress() {
  var area = document.getElementById("dailyProgress");
  var progress = dashboardData.dailyProgress || { summary: {}, items: [] };
  var summary = progress.summary || {};
  var items = progress.items || [];
  var html = '<div class="daily-head">';
  html += '<div><div class="daily-title">今日任务推进</div>';
  html += '<div class="daily-subtitle">' + (progress.date || dashboardData.updateTime) + '｜只展示相对上次同步发生变化的任务</div></div>';
  html += '<div class="daily-summary">';
  html += '<span class="daily-pill">变化 ' + (summary.totalChanges || items.length || 0) + ' 项</span>';
  html += '<span class="daily-pill">进度提升 ' + (summary.progressIncreased || 0) + ' 项</span>';
  html += '<span class="daily-pill">需支持 ' + (summary.needSupport || 0) + ' 项</span>';
  html += '</div></div>';

  if (!items.length) {
    html += '<div class="daily-empty">本次同步暂未发现新的任务进度变化。日常改动会在下一次同步后自动出现在这里。</div>';
    area.innerHTML = html;
    return;
  }

  function renderDailyItem(item) {
    var typeText = item.type === "progress" ? "进度提升" :
      (item.type === "support" ? "需要支持" :
      (item.type === "risk" ? "延期风险" :
      (item.type === "new" ? "新增跟进" : "状态变化")));
    var itemHtml = '<div class="daily-item ' + item.type + '">';
    itemHtml += '<div class="daily-meta">';
    itemHtml += '<span class="daily-tag">' + typeText + '</span>';
    itemHtml += '<span class="daily-tag">' + (item.priority || "P") + '</span>';
    if (item.module) itemHtml += '<span class="daily-tag">' + item.module + '</span>';
    itemHtml += '</div>';
    itemHtml += '<div class="daily-task-name">' + item.taskNo + '｜' + item.name + '</div>';
    itemHtml += '<div class="daily-change">';
    if (item.type === "progress" || item.type === "new") {
      itemHtml += item.owner + '：完成量从 ' + item.beforeActual + item.unit + ' 提升到 <strong>' + item.afterActual + item.unit + '</strong>';
      itemHtml += '，完成率 ' + item.beforeRate + '% → <strong>' + item.afterRate + '%</strong>';
    } else {
      itemHtml += item.owner + '：状态从 ' + (item.beforeStatus || "未记录") + ' 更新为 <strong>' + item.afterStatus + '</strong>';
    }
    if (item.collaborator) itemHtml += '<div class="daily-subtitle">协作：' + item.collaborator + '</div>';
    itemHtml += '</div>';
    itemHtml += '<div class="daily-bar"><div class="daily-bar-fill" style="width:' + item.afterRate + '%"></div></div>';
    itemHtml += '</div>';
    return itemHtml;
  }

  var groups = progress.groups || {};
  var groupNames = ["葛宗尚", "欧阳林", "共同任务"];
  html += '<div class="daily-list">';
  groupNames.forEach(function(groupName) {
    var groupItems = groups[groupName] || [];
    html += '<div class="daily-group">';
    html += '<div class="daily-group-title"><span>' + groupName + '</span><span class="daily-group-count">' + groupItems.length + ' 项</span></div>';
    if (!groupItems.length) {
      html += '<div class="daily-empty" style="padding:18px;font-size:14px;">暂无新的进展</div>';
    } else {
      groupItems.forEach(function(item) {
        html += renderDailyItem(item);
      });
    }
    html += '</div>';
  });
  html += '</div>';

  var newTasks = progress.newTasks || [];
  if (newTasks.length) {
    html += '<div class="new-task-window">';
    html += '<div class="new-task-title"><span>新增任务</span><span class="daily-group-count">' + newTasks.length + ' 条</span></div>';
    html += '<div class="new-task-list">';
    newTasks.forEach(function(task) {
      html += '<div class="new-task-card">';
      html += '<div class="new-task-name">' + task.taskNo + '｜' + task.name + '</div>';
      html += '<div class="new-task-meta">负责人：' + (task.owner || "-") + (task.collaborator ? '｜协作：' + task.collaborator : '') + '</div>';
      html += '<div class="new-task-meta">模块：' + (task.module || "-") + '｜优先级：' + (task.priority || "-") + '｜截止：' + (task.deadline || "-") + '</div>';
      html += '<div class="new-task-meta">目标：' + task.target + task.unit + '｜状态：' + (task.afterStatus || "-") + '</div>';
      html += '</div>';
    });
    html += '</div></div>';
  }
  area.innerHTML = html;
}

/** 点击展开KPI备注 */
function toggleNote(el) {
  var note = el.querySelector(".pkpi-note");
  if (note) note.classList.toggle("show");
}

/* ============================================================
   筛选功能
   ============================================================ */
function applyFilters() {
  var filterOwner = document.getElementById("filterOwner").value;
  var filterStatus = document.getElementById("filterStatus").value;

  // 筛选KPI总表
  document.querySelectorAll("#kpiTable tbody tr").forEach(function(row) {
    var owner = row.getAttribute("data-owner");
    var status = row.getAttribute("data-status");
    var show = true;
    if (filterOwner !== "all" && owner !== filterOwner) show = false;
    if (filterStatus !== "all" && status !== filterStatus) show = false;
    row.style.display = show ? "" : "none";
  });

  // 筛选P0表
  document.querySelectorAll("#p0Table tbody tr").forEach(function(row) {
    var owner = row.getAttribute("data-owner");
    var show = true;
    if (filterOwner !== "all" && owner !== filterOwner) show = false;
    row.style.display = show ? "" : "none";
  });
}

/* ============================================================
   初始化
   ============================================================ */
function init() {
  renderHeader();
  renderOverview();
  renderDailyProgress();
  renderStores();
  renderPersonCards();
  renderKPITable();
  renderP0Table();
  renderNonCompliance();
  renderAchievements();
  renderSupport();

  // 绑定筛选事件
  document.getElementById("filterOwner").addEventListener("change", applyFilters);
  document.getElementById("filterStatus").addEventListener("change", applyFilters);
}

// 页面加载完成后初始化
document.addEventListener("DOMContentLoaded", init);

// 暴露toggleNote到全局
window.toggleNote = toggleNote;
</script>
